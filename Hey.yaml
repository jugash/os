{
    "title": "lola-hardware-device-plugin",
    "interval": "1m",
    "rules": [
        {
            "title": "LolaOnloadUnavailable",
            "condition": "A",
            "data": [
                {
                    "refId": "A",
                    "queryType": "",
                    "relativeTimeRange": {
                        "from": 300,
                        "to": 0
                    },
                    "datasourceUid": "YOUR_PROMETHEUS_UID",
                    "model": {
                        "expr": "lola_onload_available == 0",
                        "refId": "A",
                        "intervalMs": 1000,
                        "maxDataPoints": 43200
                    }
                }
            ],
            "for": "2m",
            "annotations": {
                "summary": "/dev/onload missing on {{ $labels.kubernetes_node }}",
                "description": "The LOLA device plugin holds amd.com/onload resources but the Onload kernel module is not loaded on this node. All devices are currently marked Unhealthy, causing allocatable to be 0. Pods requesting this resource will remain Pending.",
                "runbook_url": "https://your-wiki/lola/onload-unavailable"
            },
            "labels": {
                "severity": "warning"
            },
            "noDataState": "OK",
            "execErrState": "Error",
            "isPaused": false
        },
        {
            "title": "LolaPluginNotRegistered",
            "condition": "A",
            "data": [
                {
                    "refId": "A",
                    "queryType": "",
                    "relativeTimeRange": {
                        "from": 300,
                        "to": 0
                    },
                    "datasourceUid": "YOUR_PROMETHEUS_UID",
                    "model": {
                        "expr": "lola_plugin_registered == 0",
                        "refId": "A",
                        "intervalMs": 1000,
                        "maxDataPoints": 43200
                    }
                }
            ],
            "for": "5m",
            "annotations": {
                "summary": "LOLA {{ $labels.plugin }} plugin not registered on {{ $labels.kubernetes_node }}",
                "description": "The device plugin server is running but is not registered with the Kubelet. This usually means the Kubelet socket is unreachable or the GRPC registration failed."
            },
            "labels": {
                "severity": "critical"
            },
            "noDataState": "OK",
            "execErrState": "Error",
            "isPaused": false
        },
        {
            "title": "LolaDevicePluginDown",
            "condition": "A",
            "data": [
                {
                    "refId": "A",
                    "queryType": "",
                    "relativeTimeRange": {
                        "from": 300,
                        "to": 0
                    },
                    "datasourceUid": "YOUR_PROMETHEUS_UID",
                    "model": {
                        "expr": "absent(up{job=\"hardware-device-plugin\"} == 1)",
                        "refId": "A",
                        "intervalMs": 1000,
                        "maxDataPoints": 43200
                    }
                }
            ],
            "for": "5m",
            "annotations": {
                "summary": "LOLA device plugin down",
                "description": "No metrics scraped from LOLA device plugin instances in the last 5m."
            },
            "labels": {
                "severity": "critical"
            },
            "noDataState": "OK",
            "execErrState": "Error",
            "isPaused": false
        },
        {
            "title": "LolaAllocationErrorRate",
            "condition": "A",
            "data": [
                {
                    "refId": "A",
                    "queryType": "",
                    "relativeTimeRange": {
                        "from": 300,
                        "to": 0
                    },
                    "datasourceUid": "YOUR_PROMETHEUS_UID",
                    "model": {
                        "expr": "rate(lola_allocation_errors_total[5m]) > 0",
                        "refId": "A",
                        "intervalMs": 1000,
                        "maxDataPoints": 43200
                    }
                }
            ],
            "for": "0s",
            "annotations": {
                "summary": "High allocation error rate for {{ $labels.plugin }}",
                "description": "Pod allocation requests are failing, likely because requested devices no longer exist or the plugin is in an inconsistent state."
            },
            "labels": {
                "severity": "warning"
            },
            "noDataState": "OK",
            "execErrState": "Error",
            "isPaused": false
        }
    ]
}
