diff --git a/k8s-hardware-device-plugin/src/metrics.py b/k8s-hardware-device-plugin/src/metrics.py
new file mode 100644
index 0000000..1e9f609
--- /dev/null
+++ b/k8s-hardware-device-plugin/src/metrics.py
@@ -0,0 +1,179 @@
+"""
+Observability module – Prometheus metrics + health endpoints
+=============================================================
+Exposes a single HTTP server (default port 8080) with three endpoints:
+
+  /metrics   – Prometheus text format scrape endpoint
+  /healthz   – liveness  probe  (200 when the process is alive)
+  /readyz    – readiness probe  (200 when both plugins are registered)
+
+Usage
+-----
+Call ``start_metrics_server()`` once from main.py before starting plugins.
+Each plugin calls the metric helpers (record_refresh, record_allocate, …)
+from its own methods to update counters and gauges.
+
+All metric names are prefixed with ``lola_`` so they are easy to filter
+in Prometheus / Grafana:
+
+  lola_devices_total{plugin, health}           Gauge
+  lola_onload_available                        Gauge   (1/0)
+  lola_plugin_registered{plugin}               Gauge   (1/0)
+  lola_allocations_total{plugin}               Counter
+  lola_allocation_errors_total{plugin}         Counter
+  lola_device_refresh_duration_seconds{plugin} Histogram
+"""
+
+import logging
+import threading
+from http.server import BaseHTTPRequestHandler, HTTPServer
+from typing import Optional
+
+from prometheus_client import (
+    CollectorRegistry,
+    Counter,
+    Gauge,
+    Histogram,
+    generate_latest,
+    CONTENT_TYPE_LATEST,
+    REGISTRY,
+)
+
+log = logging.getLogger(__name__)
+
+# ── Metric definitions ────────────────────────────────────────────────────────
+# All metrics use the default REGISTRY so prometheus_client's built-in process
+# and GC collectors are also exported automatically.
+
+devices_total = Gauge(
+    "lola_devices_total",
+    "Number of devices by plugin and health state",
+    ["plugin", "health"],
+)
+
+onload_available = Gauge(
+    "lola_onload_available",
+    "1 if /dev/onload is present on this node, 0 otherwise",
+)
+
+plugin_registered = Gauge(
+    "lola_plugin_registered",
+    "1 if the plugin is currently registered with the kubelet, 0 otherwise",
+    ["plugin"],
+)
+
+allocations_total = Counter(
+    "lola_allocations_total",
+    "Total number of successful Allocate() calls handled",
+    ["plugin"],
+)
+
+allocation_errors_total = Counter(
+    "lola_allocation_errors_total",
+    "Total number of failed Allocate() calls (device not found or gRPC error)",
+    ["plugin"],
+)
+
+device_refresh_duration_seconds = Histogram(
+    "lola_device_refresh_duration_seconds",
+    "Wall-clock time spent re-scanning for devices",
+    ["plugin"],
+    buckets=(0.001, 0.005, 0.01, 0.05, 0.1, 0.5, 1.0, 5.0),
+)
+
+# Initialise label combinations to 0 so Prometheus never sees missing series
+for _plugin in ("cpu", "onload"):
+    allocations_total.labels(plugin=_plugin)
+    allocation_errors_total.labels(plugin=_plugin)
+    plugin_registered.labels(plugin=_plugin).set(0)
+    for _health in ("Healthy", "Unhealthy"):
+        devices_total.labels(plugin=_plugin, health=_health).set(0)
+
+onload_available.set(0)
+
+
+# ── Readiness state ───────────────────────────────────────────────────────────
+# Both plugins call set_registered() after a successful Register() RPC.
+# /readyz returns 200 only when both have registered at least once.
+
+_registered: set = set()
+_registered_lock = threading.Lock()
+
+
+def set_registered(plugin: str) -> None:
+    """Mark a plugin as registered with the kubelet."""
+    with _registered_lock:
+        _registered.add(plugin)
+    plugin_registered.labels(plugin=plugin).set(1)
+    log.debug("metrics: plugin '%s' marked as registered", plugin)
+
+
+def set_unregistered(plugin: str) -> None:
+    """Mark a plugin as no longer registered (e.g. after kubelet restart)."""
+    with _registered_lock:
+        _registered.discard(plugin)
+    plugin_registered.labels(plugin=plugin).set(0)
+
+
+def _both_registered() -> bool:
+    with _registered_lock:
+        return {"cpu", "onload"}.issubset(_registered)
+
+
+# ── HTTP handler ──────────────────────────────────────────────────────────────
+
+class _MetricsHandler(BaseHTTPRequestHandler):
+    """Minimal HTTP handler for /metrics, /healthz, /readyz."""
+
+    def do_GET(self) -> None:  # noqa: N802
+        if self.path == "/metrics":
+            data = generate_latest(REGISTRY)
+            self._respond(200, CONTENT_TYPE_LATEST, data)
+
+        elif self.path == "/healthz":
+            # Process is alive → always 200
+            self._respond(200, "text/plain", b"ok\n")
+
+        elif self.path == "/readyz":
+            if _both_registered():
+                self._respond(200, "text/plain", b"ok\n")
+            else:
+                with _registered_lock:
+                    missing = {"cpu", "onload"} - _registered
+                body = f"not ready: {sorted(missing)} not registered\n".encode()
+                self._respond(503, "text/plain", body)
+
+        else:
+            self._respond(404, "text/plain", b"not found\n")
+
+    def _respond(self, code: int, content_type: str, body: bytes) -> None:
+        self.send_response(code)
+        self.send_header("Content-Type", content_type)
+        self.send_header("Content-Length", str(len(body)))
+        self.end_headers()
+        self.wfile.write(body)
+
+    def log_message(self, fmt, *args) -> None:  # suppress default access log
+        pass
+
+
+# ── Server startup ────────────────────────────────────────────────────────────
+
+_server: Optional[HTTPServer] = None
+
+
+def start_metrics_server(port: int = 8080) -> None:
+    """
+    Start the metrics HTTP server in a daemon thread.
+
+    Safe to call multiple times – subsequent calls are no-ops.
+    """
+    global _server
+    if _server is not None:
+        return
+
+    _server = HTTPServer(("", port), _MetricsHandler)
+    thread = threading.Thread(target=_server.serve_forever, daemon=True,
+                              name="metrics-http")
+    thread.start()
+    log.info("Metrics server listening on :%d  (/metrics /healthz /readyz)", port)
